include ':app'
include ':tools:make-emoji-keys'

// Dynamically enable R8 fullMode for non-reproducible optimised flavor builds to unlock maximum compilation optimizations.
if (gradle.startParameter.taskNames.any { it.toLowerCase().contains("optimised") || it.toLowerCase().contains("optimized") }) {
    gradle.startParameter.projectProperties["android.enableR8.fullMode"] = "true"
}
